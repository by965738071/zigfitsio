name: CI

# Portability matrix (NFR-PORT-1/2/3, X-CI): {Linux, macOS, Windows} × {x86_64, aarch64}
# running `zig build test`, a big-endian cell under QEMU (the only way to exercise a genuine
# native big-endian read path — the LE host matrix cannot, NFR-PORT-2), and a
# wasm32-freestanding core build (NFR-PORT-3).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, unconditional run of the `interop` job (bypassing its path filter below) so
    # CFITSIO/fpack/Astropy toolchain drift is caught even when no PR touches interop-relevant
    # paths (test-plan Phase 4: the job was previously push/PR-path-gated only, so an unrelated
    # week of PRs could pass with a silently-broken interop leg).
    - cron: "0 6 * * 1" # Monday 06:00 UTC

permissions:
  contents: read

# Cancel superseded PR runs only. The group includes event_name so the weekly `schedule`
# run (whose ref is also refs/heads/main) never shares a group with main-push runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ZIG_VERSION: "0.16.0"

jobs:
  test:
    name: test ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: x86_64, runner: ubuntu-latest }
          - { os: linux, arch: aarch64, runner: ubuntu-24.04-arm }
          - { os: macos, arch: aarch64, runner: macos-latest }
          # macos-13 (the previous Intel image) was retired 2025-12-04; macos-15-intel is
          # GitHub's last x86_64 macOS image and sunsets August 2027 — this {macos, x86_64}
          # cell needs a new home then.
          - { os: macos, arch: x86_64, runner: macos-15-intel }
          - { os: windows, arch: x86_64, runner: windows-latest }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build test --summary all
      - run: zig build        # static library artifact

  windows-aarch64-cross:
    name: windows-aarch64 cross-compile (NFR-PORT-1, design §24.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      # No hosted Windows/aarch64 runner, so cross-compile the library for aarch64-windows to
      # keep that {os,arch} cell of the portability matrix exercised (it type-checks the full
      # OS-adjacent path for the target; the binary cannot be executed on this host).
      - run: zig build -Dtarget=aarch64-windows

  wasm-freestanding:
    name: wasm32-freestanding core build (NFR-PORT-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build wasm-check

  big-endian:
    name: big-endian (s390x under QEMU, NFR-PORT-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install QEMU user emulation
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Cross-compile and run the test suite for s390x (big-endian)
        # Build the test binary for s390x-linux and execute it under QEMU; this exercises the
        # genuine native big-endian endian.read/write paths that the LE matrix cannot.
        run: |
          zig build test -Dtarget=s390x-linux-gnu \
            -fqemu --glibc-runtimes /usr/lib --summary all || \
          zig test src/root.zig -target s390x-linux-gnu -fqemu --summary all

  guards:
    name: invariant guards (X-GUARD, GC-1/2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: No C imports or C sources (GC-1)
        run: |
          set -e
          if grep -rnE "@cImport|@cInclude|@cDefine" src tools test; then
            echo "::error::found a C import (GC-1 violation)"; exit 1; fi
          if find src tools test -name '*.c' -o -name '*.h' | grep -q .; then
            echo "::error::found a C source/header (GC-1 violation)"; exit 1; fi
      - name: No third-party dependencies (GC-2)
        run: |
          if grep -qE "\.dependencies = \.\{\s*\}" build.zig.zon; then
            echo "ok: dependency-free"; else
            echo "::error::build.zig.zon has dependencies (GC-2 violation)"; exit 1; fi
      - name: Idiomatic std.Io (no lowercase std.io)
        run: |
          if grep -rnE "std\.io\." src; then
            echo "::error::use std.Io (uppercase) per Zig 0.16"; exit 1; fi
          echo "guards passed"

  fuzz-smoke:
    name: fuzz harness smoke (NFR-SAFE-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build fuzz   # runs the seeded harnesses once (use --fuzz for the fuzzer)

  interop:
    # External cross-tool interop & golden-corpus parity (X-FIXTURES/X-XVAL/X-INTEROP/X-SUM).
    # The ONLY job that installs a toolchain (CFITSIO 4.6.x + fpack/funpack + Astropy); the
    # hermetic `test` matrix stays pure-Zig and runs the committed-golden consumer (test/golden.zig)
    # everywhere. Path-gated with dorny/paths-filter so the heavy work runs only when
    # interop-relevant files change, while the job always reports a result (safe as a required
    # check) — except on the weekly `schedule` trigger above, which always runs the full job
    # regardless of the path filter, so toolchain drift is caught even across a week of
    # interop-path-untouched PRs. The committed goldens are authored by CFITSIO 4.6.4 (see
    # interop/README.md); this job proves cross-tool interop semantically (version-tolerant) and
    # byte-checks regeneration as an informational guard.
    name: external interop & golden parity (X-INTEROP/X-XVAL/X-SUM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # paths-filter only supports push/pull_request context (it needs a base to diff against),
      # so it must be skipped on the weekly `schedule` trigger — every later step then runs via
      # its `|| github.event_name == 'schedule'` arm (a skipped step's output is '' != 'true').
      - if: github.event_name != 'schedule'
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: f
        with:
          filters: |
            relevant:
              - 'interop/**'
              - 'test/golden/**'
              - 'src/compress/**'
              - 'src/checksum.zig'
              - 'src/wcs/**'
              - 'tools/emit_fixtures.zig'
              - 'build.zig'
              - '.github/workflows/ci.yml'
      - if: steps.f.outputs.relevant == 'true' || github.event_name == 'schedule'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - if: steps.f.outputs.relevant == 'true' || github.event_name == 'schedule'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install CFITSIO + fpack/funpack + Astropy
        if: steps.f.outputs.relevant == 'true' || github.event_name == 'schedule'
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y libcfitsio-dev libcfitsio-bin pkg-config
          python -m pip install --upgrade pip
          python -m pip install -r interop/requirements.txt
      - name: Inbound — Astropy reads & cross-validates every committed CFITSIO golden (X-XVAL)
        if: steps.f.outputs.relevant == 'true' || github.event_name == 'schedule'
        run: |
          set -e
          python interop/verify_outbound.py test/golden   # conformance (skips conformance/malformed)
          python interop/xval.py test/golden               # pixel/cell values match the ramp/formulas
      - name: Outbound — funpack/Astropy read every zigfitsio-written file (X-INTEROP outbound)
        if: steps.f.outputs.relevant == 'true' || github.event_name == 'schedule'
        run: |
          set -e
          OUT="$RUNNER_TEMP/outbound"
          zig build emit-fixtures -- "$OUT"
          python interop/check_funpack.py "$OUT"           # CFITSIO funpack decodes every codec to the ramp
          python interop/verify_outbound.py "$OUT"         # Astropy opens/verifies every emitted file
          for f in "$OUT"/*.fits; do fitsverify -q "$f" || true; done   # informational structural report
      - name: Golden drift-guard — regenerate & byte-diff (informational; needs CFITSIO 4.6.4)
        if: steps.f.outputs.relevant == 'true' || github.event_name == 'schedule'
        continue-on-error: true
        run: |
          make -C interop golden
          git diff --stat -- test/golden
          git diff --exit-code -- test/golden \
            || echo "::warning::regenerated goldens differ from committed bytes (likely a CFITSIO version skew vs 4.6.4); the semantic interop checks above are authoritative"
