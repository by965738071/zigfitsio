name: Python wheels & release

# Build the Python bindings: cross-platform binary wheels (cibuildwheel) plus an sdist.
# Linux wheels compile Zig inside the manylinux container via `bindings/python/ci/install_zig.sh`;
# macOS/Windows wheels use the host Zig installed by setup-zig.
#
# Release automation (CD, see RELEASING.md): pushing a tag `vX.Y.Z` additionally gates on
# version consistency + the core Zig suite, publishes wheels + sdist to PyPI via trusted
# publishing (OIDC), then creates a GitHub Release with the CHANGELOG section as notes and
# the artifacts attached. PyPI trusted publishing is bound to THIS FILENAME
# (python-wheels.yml) — renaming the file or the repo breaks publishing until the publisher
# config on PyPI is updated.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "bindings/**"
      - "src/**"
      - "build.zig"
      - "build.zig.zon"
      - "pyproject.toml"
      - "hatch_build.py"
      - "tools/wiki/**"
      - ".github/workflows/python-wheels.yml"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: "Publish the built wheels + sdist to TestPyPI (OIDC rehearsal)"
        type: boolean
        default: false

permissions:
  contents: read

# Cancel superseded PR runs only; never cancel tag/main/dispatch runs (a cancelled
# half-published release run is worse than a wasted one).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ZIG_VERSION: "master"

jobs:
  # Release gate: the version literal lives in four places (build.zig.zon, src/version.zig
  # value + test literal, pyproject.toml). Internal consistency is checked on every run so
  # drift is caught in PRs; tag runs additionally require tag == version and a matching
  # CHANGELOG section (which github-release extracts), failing fast before anything publishes.
  version-check:
    name: version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Versions agree across build.zig.zon / src/version.zig / pyproject.toml / package.json
        run: |
          set -euo pipefail
          zon="$(grep -Eo '\.version = "[^"]+"' build.zig.zon | cut -d'"' -f2)"
          zig="$(grep -Eo 'version_string = "[^"]+"' src/version.zig | cut -d'"' -f2)"
          # tomllib needs Python >=3.11 (true on any ubuntu-latest runner); the grep arm
          # keeps the script runnable locally on older interpreters.
          py="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])' 2>/dev/null ||
            grep -Eo '^version *= *"[^"]+"' pyproject.toml | head -n1 | cut -d'"' -f2)"
          ts="$(grep -Eo '"version": *"[^"]+"' bindings/typescript/package.json | head -n1 | cut -d'"' -f4)"
          echo "build.zig.zon=$zon  src/version.zig=$zig  pyproject.toml=$py  package.json=$ts"
          if [ "$zon" != "$zig" ] || [ "$zon" != "$py" ] || [ "$zon" != "$ts" ]; then
            echo "::error::version mismatch: build.zig.zon=$zon src/version.zig=$zig pyproject.toml=$py package.json=$ts"
            exit 1
          fi
          if ! grep -qF "expectEqualStrings(\"$zon\"" src/version.zig; then
            echo "::error::the version unit test in src/version.zig still asserts an old literal"
            exit 1
          fi
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tagv="${GITHUB_REF_NAME#v}"
            if [ "$tagv" != "$zon" ]; then
              echo "::error::tag $GITHUB_REF_NAME does not match project version $zon"
              exit 1
            fi
            if ! grep -qE "^## \[${tagv//./\\.}\]" CHANGELOG.md; then
              echo "::error::CHANGELOG.md has no '## [$tagv]' section (needed for release notes)"
              exit 1
            fi
          fi

  api-docs:
    name: generated API Wiki bundle
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json
      - run: npm ci
        working-directory: bindings/typescript
      - name: Test Wiki generators and publication guards
        run: |
          python3 -m unittest discover -s tools/wiki -p 'test_*.py' -v
          python3 -m pip install pytest==8.3.5
          python3 -m pytest tools/wiki/tests -q
          npm run test:docs --prefix bindings/typescript
          zig build wiki-zig-test
      - name: Generate twice and validate deterministic public API references
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${version}"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then tag="$GITHUB_REF_NAME"; fi
          python3 tools/wiki/generate.py \
            --out "$RUNNER_TEMP/wiki" --tag "$tag" --sha "$GITHUB_SHA" \
            --repository "$GITHUB_REPOSITORY"
          python3 tools/wiki/generate.py \
            --out "$RUNNER_TEMP/wiki-check" --tag "$tag" --sha "$GITHUB_SHA" \
            --repository "$GITHUB_REPOSITORY"
          diff -ru "$RUNNER_TEMP/wiki" "$RUNNER_TEMP/wiki-check"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-wiki-preview-${{ github.sha }}
          path: ${{ runner.temp }}/wiki
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 90

  # Tag pushes do not trigger ci.yml (its full matrix already ran on the same commit's main
  # push); this single cell gates publishing on the core Zig suite.
  zig-test:
    name: zig build test (release gate)
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build test --summary all

  wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel: GitHub's last x86_64 macOS image (macos-13 retired 2025-12-04);
        # sunsets August 2027, at which point Intel wheels need a new build strategy.
        os:
          [
            ubuntu-latest,
            ubuntu-24.04-arm,
            macos-latest,
            macos-15-intel,
            windows-latest,
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      # PRs build a single CPython per OS (cp312, matching the smoke job) — the bindings are
      # pure ctypes so the per-interpreter wheels differ only in tag, and this lane is the only
      # ReleaseFast coverage in CI, so at least one wheel build+test per OS must stay. Main
      # pushes, tags, and dispatch runs skip this step, leaving CIBW_BUILD unset so the full
      # [tool.cibuildwheel].build matrix from pyproject.toml applies (env vars override the
      # config file only when defined). Do NOT refactor to an always-set env var with an empty
      # else-arm: cibuildwheel treats CIBW_BUILD="" as "*" (build everything).
      - name: Restrict PR builds to CPython 3.12
        if: github.event_name == 'pull_request'
        shell: bash
        run: echo 'CIBW_BUILD=cp312-*' >> "$GITHUB_ENV"
      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          # Forward the pin to install_zig.sh inside the manylinux container.
          CIBW_ENVIRONMENT_PASS_LINUX: ZIG_VERSION
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          # v4 artifacts are immutable within a run; without this, "Re-run all jobs" (the
          # recovery path for a failed release) dies on the name conflict.
          overwrite: true

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          overwrite: true

  # Fast non-matrix smoke test: build the lib + run the suite on a single host (mirrors the
  # local dev flow), so PRs get quick Python feedback without waiting on the full wheel matrix.
  smoke:
    name: smoke test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: zig build capi
      - run: zig build capi-test --summary all
      - run: pip install numpy astropy pytest
      - run: pytest bindings/python/tests -q
        env:
          PYTHONPATH: bindings/python/src
          ZIGFITSIO_LIBRARY: ${{ github.workspace }}/zig-out/lib/libzigfitsio_capi.so

  # OIDC/plumbing rehearsal lane: manually dispatched, publishes to TestPyPI (a separate index
  # with its own independently configured trusted publisher). Exists to prove the OIDC
  # handshake + artifact merge before the first real PyPI publish.
  publish-testpypi:
    name: publish to TestPyPI (rehearsal)
    if: github.event_name == 'workflow_dispatch' && inputs.publish_testpypi
    needs: [version-check, api-docs, zig-test, wheels, sdist, smoke]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/zigfitsio
    permissions:
      id-token: write # OIDC trusted publishing; no API token anywhere
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true # flatten wheels-* into dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdist
          path: dist
      - run: ls -l dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI files are immutable too; re-running the rehearsal for an
          # already-uploaded version should no-op (it still proves the OIDC handshake).
          skip-existing: true

  publish-pypi:
    name: publish to PyPI
    # Strictly tag pushes: a workflow_dispatch run pointed at a tag ref must NOT publish here.
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [version-check, api-docs, zig-test, wheels, sdist, smoke]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zigfitsio
    permissions:
      id-token: write # OIDC trusted publishing; no API token anywhere
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true # flatten wheels-* into dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdist
          path: dist
      - run: ls -l dist/
      # No skip-existing: a duplicate upload to PyPI should fail loudly.
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [publish-pypi] # announce only after the package is actually installable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdist
          path: dist
      - name: Extract the CHANGELOG section for ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          # Print the body between '## [<ver>]' and the next '## [' heading (string match,
          # not regex; the heading lines themselves are excluded).
          awk -v ver="$ver" '
            /^## \[/ { inblock = index($0, "## [" ver "]") == 1; next }
            inblock { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          if ! grep -q '[^[:space:]]' "$RUNNER_TEMP/release-notes.md"; then
            echo "::error::extracted CHANGELOG section for $ver is empty"
            exit 1
          fi
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true # appended after the CHANGELOG excerpt
          files: dist/*
          fail_on_unmatched_files: true
