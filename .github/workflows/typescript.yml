name: TypeScript bindings & npm release

# Test the TypeScript bindings (bindings/typescript) on both runtimes — Bun via bun:ffi and
# Node via koffi — across the OS matrix, in Debug AND ReleaseFast (the wheel lane taught us
# release-mode codegen bugs hide behind Debug-only CI), plus a TS<->Python interop cross-check.
#
# Release automation: pushing a tag `vX.Y.Z` cross-compiles the 7 @zigfitsio/* platform
# packages from one runner and publishes them + the main `zigfitsio` package to npm via
# trusted publishing (OIDC, npm >= 11.5). npm trusted publishing is bound to THIS FILENAME
# (typescript.yml) and the `npm` environment — renaming either breaks publishing until the
# publisher config on npmjs.com is updated. First-ever publishes must be bootstrapped
# manually (npm has no pending publishers) — see RELEASING.md.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "bindings/**"
      - "src/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/typescript.yml"
  workflow_dispatch:
    inputs:
      publish_dry_run:
        description: "Rehearse npm publish (--dry-run) with built platform packages"
        type: boolean
        default: false

permissions:
  contents: read

# Cancel superseded PR runs only; never cancel tag/main/dispatch runs (a cancelled
# half-published release run is worse than a wasted one).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ZIG_VERSION: "0.16.0"
  BUN_VERSION: "1.3.13"

jobs:
  # package.json must agree with the canonical version in build.zig.zon (the npm/<key>
  # packages are generated with that version by scripts/build-native.mjs). Tag runs
  # additionally require tag == version, mirroring python-wheels.yml.
  version-check:
    name: version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: node bindings/typescript/scripts/check-versions.mjs
      - name: Tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          pkg="$(node -p 'require("./bindings/typescript/package.json").version')"
          tagv="${GITHUB_REF_NAME#v}"
          if [ "$tagv" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match bindings/typescript/package.json $pkg"
            exit 1
          fi

  test:
    name: test ${{ matrix.os }} (${{ matrix.optimize }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel: GitHub's last x86_64 macOS image; sunsets August 2027.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]
        optimize: [Debug]
        node: ["24"]
        include:
          # ReleaseFast lanes: release-mode codegen differences (the use_llvm bug class)
          # only surface to external FFI callers, so test them explicitly on each ABI
          # family (SysV x64, Windows x64, Apple arm64 — the bun:ffi stack-fix platform).
          - os: ubuntu-latest
            optimize: ReleaseFast
            node: "24"
          - os: windows-latest
            optimize: ReleaseFast
            node: "24"
          - os: macos-latest
            optimize: ReleaseFast
            node: "24"
          # Oldest-supported-Node lane: exercises the `engines` floor (the other
          # lanes all run current Node).
          - os: ubuntu-latest
            optimize: Debug
            node: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build the C-ABI shared library
        run: zig build capi -Doptimize=${{ matrix.optimize }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: npm ci
        working-directory: bindings/typescript
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: bindings/typescript
      - name: Typecheck tests (public generics)
        run: npm run typecheck:tests
        working-directory: bindings/typescript
      - name: Bun lane (bun:ffi)
        run: bun test tests
        working-directory: bindings/typescript
      - name: Node lane (koffi)
        run: npx vitest run
        working-directory: bindings/typescript

  # TS writes -> Python reads, Python writes -> TS reads, against one shared capi build.
  interop:
    name: TS <-> Python interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: zig build capi
      - run: pip install numpy
      - run: npm ci && npm run build
        working-directory: bindings/typescript
      - name: Cross-checks (both directions, both JS runtimes)
        working-directory: bindings/typescript
        env:
          PYTHONPATH: ${{ github.workspace }}/bindings/python/src
          ZIGFITSIO_LIBRARY: ${{ github.workspace }}/zig-out/lib/libzigfitsio_capi.so
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/interop"
          mkdir -p "$dir"
          bun tests/interop/write_corpus.mjs "$dir"
          python3 tests/interop/py_interop.py read "$dir"
          python3 tests/interop/py_interop.py write "$dir"
          node tests/interop/read_corpus.mjs "$dir"
          bun tests/interop/read_corpus.mjs "$dir"

  # One runner cross-compiles every platform package (Zig makes this trivial); the artifact
  # feeds the publish jobs.
  build-natives:
    name: build platform packages
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_dry_run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: node scripts/build-native.mjs
        working-directory: bindings/typescript
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages
          path: bindings/typescript/npm/
          overwrite: true

  # OIDC/plumbing rehearsal lane: manually dispatched, runs the exact publish steps with
  # --dry-run (no environment gate needed since nothing uploads).
  publish-rehearsal:
    name: npm publish rehearsal (--dry-run)
    if: github.event_name == 'workflow_dispatch' && inputs.publish_dry_run
    needs: [version-check, test, interop, build-natives]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: bindings/typescript/npm
      - run: npm ci
        working-directory: bindings/typescript
      - name: Dry-run publish (platform packages, then main)
        working-directory: bindings/typescript
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            npm publish "$dir" --access public --dry-run
          done
          node scripts/prepare-publish.mjs
          npm publish --access public --dry-run

  publish-npm:
    name: publish to npm
    # Strictly tag pushes: a workflow_dispatch run pointed at a tag ref must NOT publish here.
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [version-check, test, interop, build-natives]
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/zigfitsio
    permissions:
      contents: read # job-level permissions replace the workflow block; checkout still needs this
      id-token: write # OIDC trusted publishing; no npm token anywhere
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24" # bundles npm >= 11.5 (OIDC trusted publishing + provenance)
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: bindings/typescript/npm
      - run: npm ci
        working-directory: bindings/typescript
      # Platform packages first so the main package's injected optionalDependencies
      # (exact-version pins) are resolvable the moment it lands. Every publish is
      # skipped when that exact version already exists, so a run that failed partway
      # (npm registry 5xx) can be re-run without dying on EPUBLISHCONFLICT.
      - name: Publish platform packages
        working-directory: bindings/typescript
        run: |
          set -euo pipefail
          ver="$(node -p 'require("./package.json").version')"
          for dir in npm/*/; do
            name="$(node -p "require('./${dir}package.json').name")"
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "${name}@${ver} already published; skipping"
              continue
            fi
            npm publish "$dir" --access public
          done
      - name: Publish zigfitsio
        working-directory: bindings/typescript
        run: |
          set -euo pipefail
          ver="$(node -p 'require("./package.json").version')"
          if npm view "zigfitsio@${ver}" version >/dev/null 2>&1; then
            echo "zigfitsio@${ver} already published; skipping"
            exit 0
          fi
          node scripts/prepare-publish.mjs
          npm publish --access public
